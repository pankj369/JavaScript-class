<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAME</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Rock Paper Scissors</h1>
    <div class="game-container">
        <div class="choices">
            <button onclick="playGame('rock')">🪨 Rock</button>
            <button onclick="playGame('paper')">📄 Paper</button>
            <button onclick="playGame('scissors')">✂️ Scissors</button>
        </div>
        <div class="result" id="result">Make your move!</div>
        <div class="score" id="score">Player: 0 | Computer: 0</div>
    </div>
    <div class="footer">Made with ❤️ by Rock Paper Scissors Enthusiasts</div>

  <script src="script.js"></script>
</body>
</html>
